services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: medmelook-web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SHOP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: medmelook-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
    environment:
      MARIADB_DATABASE: ${DB_NAME:-lkasztel_medmelook}
      MARIADB_USER: ${DB_USER:-lkasztel_medmelook}
      MARIADB_PASSWORD: ${DB_PASSWORD:-Olunia240120)^}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Olunia240120)^}
      SHOP_DOMAIN: ${SHOP_BIND_IP:-192.168.30.100}:${SHOP_PORT:-8080}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - db_data:/var/lib/mysql
      - ./medmelook_2026-03-11_14-55.sql.gz:/docker-entrypoint-initdb.d/10-medmelook.sql.gz:ro
      - ./docker/db/init/20-shop-url.sql:/docker-entrypoint-initdb.d/20-shop-url.sql:ro
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: medmelook-phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-lkasztel_medmelook}
      PMA_PASSWORD: ${DB_PASSWORD:-Olunia240120)^}
      UPLOAD_LIMIT: 256M
      MEMORY_LIMIT: 512M
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  db_data:
